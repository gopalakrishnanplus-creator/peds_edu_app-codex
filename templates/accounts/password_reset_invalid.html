{% extends "base.html" %}
{% block title %}Invalid Link{% endblock %}
{% block header_title %}Invalid Link{% endblock %}

{% block content %}
<div class="page-shell page-shell--auth">
  <section class="card hero-card stack-lg">
    <div class="section-heading__text">
      <h2>Invalid or expired link</h2>
      <p class="section-subtitle">This password reset link is invalid or has expired.</p>
    </div>
    <div class="form-actions">
      <a class="btn btn-secondary" href="{% url 'accounts:request_password_reset' %}">Request a new password reset link</a>
    </div>
  </section>
</div>
{% endblock %}
