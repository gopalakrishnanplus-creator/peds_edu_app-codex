{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block header_title %}Forgot Password{% endblock %}

{% block content %}
<div class="page-shell page-shell--auth">
  <section class="card hero-card stack-lg">
    <div class="section-heading__text">
      <h2>Reset your password</h2>
      <p class="section-subtitle">Enter your registered email address. We will send you a password reset link.</p>
    </div>

    <form method="post" class="form-stack">
      {% csrf_token %}

      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="form-actions">
        <button type="submit">Send reset instructions</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
