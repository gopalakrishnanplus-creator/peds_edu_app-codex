{% extends "base.html" %}
{% block content %}
<div class="page-shell">
  <section class="card stack-lg">
    <div class="section-heading">
      <div class="section-heading__text">
        <h1>Videos</h1>
      </div>
      <a class="btn" href="{% url 'publisher:video_create' %}">New Video</a>
    </div>

    <form method="get" class="toolbar">
      <div class="toolbar__grow">
        <input name="q" value="{{ q }}" placeholder="Search by code or keywords" />
      </div>
      <button type="submit" class="btn btn-secondary">Search</button>
    </form>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Published</th>
            <th>Active</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for r in rows %}
            <tr>
              <td>{{ r.code }}</td>
              <td>{{ r.is_published }}</td>
              <td>{{ r.is_active }}</td>
              <td><a href="{% url 'publisher:video_edit' r.pk %}">Edit</a></td>
            </tr>
          {% empty %}
            <tr><td class="table-empty" colspan="4">No videos found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </section>
</div>
{% endblock %}
