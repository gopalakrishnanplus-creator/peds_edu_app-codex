{% extends "base.html" %}
{% block content %}
<div class="page-shell page-shell--narrow">
  <section class="card stack-lg">
    <div class="section-heading__text">
      <h2>{% if is_new %}New trigger cluster{% else %}Edit trigger cluster{% endif %}</h2>
    </div>

    <form method="post" class="generated-form">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="message error">{{ form.non_field_errors }}</div>
      {% endif %}

      {{ form.as_p }}

      <div class="form-actions">
        <button type="submit">Save</button>
        <a class="btn btn-secondary" href="{% url 'publisher:triggercluster_list' %}">Back</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
